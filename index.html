<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Julia et les animaux perdus</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        overflow: hidden;
        background: #87ceeb;
        font-family: Arial, sans-serif;
    }

    #viewport {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
    }

    #world {
        width: 2200px;
        height: 1400px;
        position: absolute;
        background:
        linear-gradient(#87CEEB 0%, #bdefff 35%, #63bf65 35%, #4b944c 100%);
    }

    #player {
        position: absolute;
        width: 64px;
        height: 64px;
        font-size: 52px;
        z-index: 10;
        transition: transform 0.08s;
    }

    .animal {
        position: absolute;
        font-size: 48px;
        z-index: 5;
    }

    .obstacle {
        position: absolute;
    }

    .rock {
        background: #777;
        border-radius: 20px;
    }

    .log {
        background: #6d3d14;
        border-radius: 10px;
    }

    .river {
        background: #2f8fff;
    }

    .tree {
        position: absolute;
        width: 90px;
        height: 120px;
    }

    .treeTop {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        background: #228b22;
    }

    .treeTrunk {
        width: 20px;
        height: 40px;
        background: #6d3d14;
        margin: auto;
    }

    #ui {
        position: fixed;
        top: 15px;
        left: 15px;
        color: white;
        z-index: 999;
        text-shadow: 2px 2px 5px black;
    }

    #messageBox {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        width: 500px;
        max-width: 90%;
        padding: 25px;
        border-radius: 20px;
        display: none;
        z-index: 1000;
        box-shadow: 0 0 30px rgba(0,0,0,0.4);
    }

    #messageBox h2 {
        margin-bottom: 15px;
        color: #ff5ca8;
    }

    #messageBox p {
        line-height: 1.5;
        font-size: 18px;
    }

    button {
        margin-top: 20px;
        padding: 10px 18px;
        border: none;
        border-radius: 10px;
        background: #4caf50;
        color: white;
        cursor: pointer;
    }

    #winScreen {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.8);
        display: none;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        color: white;
        z-index: 2000;
    }

    #winScreen h1 {
        font-size: 60px;
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<div id="viewport">

    <div id="world">

        <!-- Joueur -->
        <div id="player">🦦</div>

        <!-- Animaux -->
        <div class="animal" id="minette" style="left:1800px;top:350px;">🐱</div>
        <div class="animal" id="tchoupi" style="left:400px;top:1100px;">🐰</div>
        <div class="animal" id="tiplouf" style="left:1950px;top:1200px;">🐇</div>

        <!-- Obstacles -->
        <div class="obstacle rock" style="left:500px;top:300px;width:160px;height:120px;"></div>
        <div class="obstacle rock" style="left:1300px;top:850px;width:200px;height:140px;"></div>

        <div class="obstacle log" style="left:900px;top:400px;width:300px;height:50px;"></div>
        <div class="obstacle log" style="left:1400px;top:200px;width:250px;height:50px;"></div>

        <div class="obstacle river" style="left:700px;top:0;width:180px;height:700px;"></div>

        <!-- Arbres -->
        <div class="tree" style="left:250px;top:250px;">
            <div class="treeTop"></div>
            <div class="treeTrunk"></div>
        </div>

        <div class="tree" style="left:1600px;top:900px;">
            <div class="treeTop"></div>
            <div class="treeTrunk"></div>
        </div>

    </div>
</div>

<div id="ui">
    <h1>🦦 Julia</h1>
    <p>Animaux retrouvés : <span id="score">0</span>/3</p>
    <p>ZQSD ou flèches directionnelles</p>
</div>

<div id="messageBox">
    <h2>📩 Lettre trouvée</h2>
    <p id="messageText"></p>
    <button onclick="closeMessage()">Continuer</button>
</div>

<div id="winScreen">
    <h1>🎉 Bravo !</h1>
    <p>Julia a retrouvé tous ses amis.</p>
</div>

<script>
const player = document.getElementById("player");
const world = document.getElementById("world");

let x = 120;
let y = 120;
const speed = 5;

let found = 0;

const keys = {};

const messages = {
    minette: "Même dans les moments compliqués, tu avances toujours 🐱",
    tchoupi: "Les petites victoires comptent énormément 🐰",
    tiplouf: "Continue d’avancer, tu peux être fier de toi 🐇"
};

const obstacles = [...document.querySelectorAll(".obstacle")];

function rectsCollide(r1, r2) {
    return (
        r1.x < r2.x + r2.width &&
        r1.x + r1.width > r2.x &&
        r1.y < r2.y + r2.height &&
        r1.y + r1.height > r2.y
    );
}

function movePlayer() {

    let nextX = x;
    let nextY = y;

    if(keys["w"] || keys["arrowup"]) nextY -= speed;
    if(keys["s"] || keys["arrowdown"]) nextY += speed;
    if(keys["a"] || keys["arrowleft"]) nextX -= speed;
    if(keys["d"] || keys["arrowright"]) nextX += speed;

    const futureRect = {
        x: nextX,
        y: nextY,
        width: 50,
        height: 50
    };

    let blocked = false;

    obstacles.forEach(obs => {
        const rect = {
            x: obs.offsetLeft,
            y: obs.offsetTop,
            width: obs.offsetWidth,
            height: obs.offsetHeight
        };

        if(rectsCollide(futureRect, rect)) {
            blocked = true;
        }
    });

    if(!blocked) {
        x = nextX;
        y = nextY;
    }

    x = Math.max(0, Math.min(2140, x));
    y = Math.max(0, Math.min(1340, y));

    player.style.left = x + "px";
    player.style.top = y + "px";

    cameraFollow();
    checkAnimals();

    requestAnimationFrame(movePlayer);
}

function cameraFollow() {
    const camX = x - window.innerWidth / 2;
    const camY = y - window.innerHeight / 2;

    world.style.transform =
        `translate(${-camX}px, ${-camY}px)`;
}

function checkAnimals() {

    document.querySelectorAll(".animal").forEach(animal => {

        if(animal.dataset.done) return;

        const ax = animal.offsetLeft;
        const ay = animal.offsetTop;

        const dist = Math.hypot(ax - x, ay - y);

        if(dist < 70) {

            animal.dataset.done = true;
            animal.style.display = "none";

            found++;

            document.getElementById("score").textContent = found;

            document.getElementById("messageText").innerText =
                messages[animal.id];

            document.getElementById("messageBox").style.display = "block";

            if(found === 3) {
                setTimeout(() => {
                    document.getElementById("winScreen").style.display = "flex";
                }, 800);
            }
        }
    });
}

function closeMessage() {
    document.getElementById("messageBox").style.display = "none";
}

window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
});

window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
});

movePlayer();
</script>

</body>
</html>
